services:
  postgres:
    image: postgres:16-alpine
    container_name: moneymind-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: moneymind
      POSTGRES_PASSWORD: moneymind_secret
      POSTGRES_DB: moneymind
    volumes:
      - moneymind_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U moneymind -d moneymind']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  moneymind_pg_data:
